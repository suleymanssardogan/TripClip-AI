
version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: tripclip-postgres
    environment:
      POSTGRES_USER: tripclip
      POSTGRES_PASSWORD: tripclip123
      POSTGRES_DB: tripclip
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tripclip-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mongodb:
    image: mongo:7
    container_name: tripclip-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  redis_data:
  mongo_data:


