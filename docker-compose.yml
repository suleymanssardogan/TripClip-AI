services:
  # Databases
  postgres:
    image: postgres:15
    container_name: tripclip-postgres
    environment:
      POSTGRES_USER: tripclip
      POSTGRES_PASSWORD: tripclip123
      POSTGRES_DB: tripclip
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tripclip-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mongodb:
    image: mongo:7
    container_name: tripclip-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # Core API
  core-api:
    build: ./services/core-api
    container_name: tripclip-core-api
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - mongodb
    environment:
      - DATABASE_URL=postgresql://tripclip:tripclip123@postgres:5432/tripclip
      - REDIS_URL=redis://redis:6379/0
      - MONGODB_URL=mongodb://mongodb:27017/tripclip

  # Mobile BFF
  mobile-bff:
    build: ./services/mobile-bff
    container_name: tripclip-mobile-bff
    ports:
      - "8001:8001"
    depends_on:
      - core-api
    environment:
      - CORE_API_URL=http://core-api:8000

  # Web BFF
  web-bff:
    build: ./services/web-bff
    container_name: tripclip-web-bff
    ports:
      - "8002:8002"
    depends_on:
      - core-api
    environment:
      - CORE_API_URL=http://core-api:8000

volumes:
  postgres_data:
  redis_data:
  mongo_data:
